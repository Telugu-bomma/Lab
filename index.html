<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pardhu's Security Lab</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px; cursor: pointer; }
        #result { margin-top: 20px; color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Welcome to XSS Lab 🕵️‍♂️</h1>
    <p>Enter your name to see a greeting:</p>
    
    <input type="text" id="userInput" placeholder="Type something...">
    <button onclick="displayGreeting()">Greet Me!</button>

    <div id="result"></div>

    <script>
        function displayGreeting() {
            var name = document.getElementById('userInput').value;
            // హ్యాకింగ్ జరగడానికి కారణం ఇక్కడ 'innerHTML' వాడటం
            document.getElementById('result').innerHTML = "Hello, " + name + "!";
        }
    </script>
</body>
</html>
