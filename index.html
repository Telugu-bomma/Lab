<!DOCTYPE html>
<html>
<head>
    <title>Pardhu's Stored XSS Lab 🕵️‍♂️</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .comment-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #commentDisplay { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        .user-comment { background: #e2e2e2; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Pardhu News Portal 📰</h2>
    <div class="comment-box">
        <h4>Leave a Comment:</h4>
        <textarea id="commentInput" rows="3" style="width:100%" placeholder="Write your comment..."></textarea><br><br>
        <button onclick="postComment()">Post Comment</button>
    </div>

    <div id="commentDisplay">
        <h4>Recent Comments:</h4>
        </div>

    <script>
        // పేజీ లోడ్ అవ్వగానే పాత కామెంట్లు చూపిస్తుంది
        window.onload = function() {
            displayComments();
        };

        function postComment() {
            let comment = document.getElementById('commentInput').value;
            let comments = JSON.parse(localStorage.getItem('saved_comments') || "[]");
            comments.push(comment);
            localStorage.setItem('saved_comments', JSON.stringify(comments));
            document.getElementById('commentInput').value = "";
            displayComments();
        }

        function displayComments() {
            let comments = JSON.parse(localStorage.getItem('saved_comments') || "[]");
            let displayArea = document.getElementById('commentDisplay');
            displayArea.innerHTML = "<h4>Recent Comments:</h4>"; // క్లీన్ చేసి మళ్ళీ చూపిస్తుంది
            
            comments.forEach(c => {
                let div = document.createElement('div');
                div.className = "user-comment";
                // హ్యాకింగ్ కి కారణం ఇక్కడ 'innerHTML' వాడటమే!
                div.innerHTML = c; 
                displayArea.appendChild(div);
            });
        }
    </script>
</body>
</html>
