<!DOCTYPE html>
<html>
<head>
  <title>Public Comment Lab 🧪</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      background: #f4f4f4;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .comment {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

    <body>

<h2>🧪 Public Comment Lab</h2>

<input id="name" placeholder="Your name" />
<textarea id="comment" placeholder="Write comment..."></textarea>
<button onclick="postComment()">Post</button>

<div id="comments"></div>

<hr>
<h3>🛡️ Admin Login (SQLi Lab)</h3>

<input type="text" id="user" placeholder="Username"><br><br>
<input type="password" id="pass" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="loginResult"></p>

<script>
const API = "https://script.google.com/macros/s/AKfycbxcvckFP_bLiYNsDaK3EJAZbJYWdW-ePZU0-X6Rx9n1mHtHLd5DZeKOAO6cZpQ5zvI2Eg/exec";

async function loadComments() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("comments");
  container.innerHTML = "";

  data.reverse().forEach(c => {
    container.innerHTML += `
      <div class="comment">
        <b>${c.name}</b><br/>
        ${c.comment}<br/>
        <small>${new Date(c.time).toLocaleString()}</small>
      </div>
    `;
  });
}

function login() {
  let u = document.getElementById('user').value;
  let p = document.getElementById('pass').value;

  fetch(API + '?action=login&user=' + encodeURIComponent(u) + '&pass=' + encodeURIComponent(p))
  .then(res => res.text())
  .then(data => {
      document.getElementById('loginResult').innerText = data;
  });
}

async function postComment() {
  const name = document.getElementById("name").value;
  const comment = document.getElementById("comment").value;

  if (!comment) {
    alert("Enter comment!");
    return;
  }

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ name, comment })
  });

  document.getElementById("comment").value = "";
  loadComments();
}

loadComments();
</script>

</body>
</html>
