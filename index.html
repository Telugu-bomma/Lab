<!DOCTYPE html>
<html>
<head>
  <title>🧪 Public Comment Lab</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      background: #f4f4f4;
      padding: 20px;
    }

    h2 { text-align: center; }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
    }

    .comment {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>🧪 Public Comment Lab (XSS)</h2>

<input id="name" placeholder="Your name" />
<textarea id="comment" placeholder="Write comment..."></textarea>
<button onclick="postComment()">Post</button>

<div id="comments"></div>

<hr>

<h3>🏦 My Bank (CSRF Lab)</h3>
<p>Welcome Ram! Your Balance: ₹50,000</p>

<form action="https://script.google.com/macros/s/AKfycbxcvckFP_bLiYNsDaK3EJAZbJYWdW-ePZU0-X6Rx9n1mHtHLd5DZeKOAO6cZpQ5zvI2Eg/exec" method="POST">
  <input type="hidden" name="action" value="transfer">

  Transfer to:
  <input type="text" name="to" value="friend123"><br><br>

  Amount:
  <input type="number" name="amount" value="100"><br><br>

  <button type="submit">Send Money</button>
</form>

<hr>

<a href="login.html">🛡️ Go to SQLi Login Lab →</a>

<script>
const API = "https://script.google.com/macros/s/AKfycbxcvckFP_bLiYNsDaK3EJAZbJYWdW-ePZU0-X6Rx9n1mHtHLd5DZeKOAO6cZpQ5zvI2Eg/exec";

async function loadComments() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const container = document.getElementById("comments");
    container.innerHTML = "";

    data.reverse().forEach(c => {
      container.innerHTML += `
        <div class="comment">
          <b>${c.name}</b><br/>
          ${c.comment}<br/>
          <small>${new Date(c.time).toLocaleString()}</small>
        </div>
      `;
    });

  } catch (err) {
    alert("API error ⚠️");
    console.error(err);
  }
}

async function postComment() {
  const name = document.getElementById("name").value;
  const comment = document.getElementById("comment").value;

  if (!comment) {
    alert("Enter comment!");
    return;
  }

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ name, comment })
  });

  document.getElementById("comment").value = "";
  loadComments();
}

loadComments();
</script>

</body>
</html>
