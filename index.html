<!DOCTYPE html>
<html>
<head>
    <title>Pardhu's Real-time XSS Lab 🕵️‍♂️</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .comment { background: #f9f9f9; border-left: 5px solid #28a745; padding: 10px; margin-top: 10px; border-radius: 3px; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pardhu's Live News Portal 📰</h2>
        <div id="inputSection">
            <h4>Leave a Comment:</h4>
            <textarea id="commentText" rows="3" placeholder="Enter your comment..."></textarea><br>
            <button onclick="sendData()">Post Comment</button>
        </div>
        <hr>
        <h4>Global Comments:</h4>
        <div id="commentsArea">Loading comments...</div>
    </div>

    <script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxcvckFP_bLiYNsDaK3EJAZbJYWdW-ePZU0-X6Rx9n1mHtHLd5DZeKOAO6cZpQ5zvI2Eg/exec";

// POST
function sendData() {
    let msg = document.getElementById('commentText').value;
    if (!msg.trim()) return;

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({ comment: msg }),
        headers: {
            "Content-Type": "application/json"
        }
    })
    .then(res => res.json())
    .then(() => {
        document.getElementById('commentText').value = "";
        loadComments();
    })
    .catch(err => console.error("POST Error:", err));
}


// GET
function loadComments() {
    fetch(scriptURL)
    .then(res => res.json())
    .then(response => {
        let area = document.getElementById('commentsArea');
        area.innerHTML = "";

        let comments = response.data; // ✅ FIX HERE

        comments.forEach(item => {
            let div = document.createElement('div');
            div.className = "comment";

            // ✅ SAFE (NO XSS)
            div.textContent = item.comment;

            area.appendChild(div);
        });
    })
    .catch(err => console.error("GET Error:", err));
}

        fetch(scriptURL, {
  method: "POST",
  body: JSON.stringify({ comment: msg }),
  headers: {
    "Content-Type": "application/json"
  },
  mode: "cors" // ✅ add this
})


// Auto refresh
setInterval(loadComments, 5000);
window.onload = loadComments;
</script>
</body>
</html>
